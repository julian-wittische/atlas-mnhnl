project:
  type: book
  execute-dir: project
book:
  title: Atlas of Hoverflies in Luxembourg
  reader-mode: true
  repo-url: https://github.com/julian-wittische/atlas-mnhnl
  chapters:
  - index.qmd
  - acknowledgement.qmd
  - introduction.qmd
  - part: Biophysical
    chapters:
    - biophysical/geo_topography.qmd
    - biophysical/climate.qmd
    - biophysical/land_use_cover.qmd
  - history.qmd
  - ecology.qmd
  - methodology.qmd
  - glossary.qmd
  - part: Species accounts
    chapters:
    - species_account/blera_fallax.qmd
    - species_account/myathropa_florea.qmd
  - statistics.qmd
  - conservation.qmd
  - references.qmd

  sidebar:
    collapse-level: 2.0
bibliography: references.bib
format:
  html:
    number-sections: false
    toc: true
    toc-depth: 3
    smooth-scroll: true
    html-math-method: katex
    theme:
      light:
      - zephyr
      - style.scss
execute:
  echo: true
  warning: false
  message: false
  freeze: auto
