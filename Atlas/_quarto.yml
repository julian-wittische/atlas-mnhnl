project:
  type: book
  execute-dir: project
book:
  title: Atlas of Hoverflies in Luxembourg
  chapters:
  - index.qmd
  - acknowledgement.qmd
  - introduction.qmd
  - biophysical.qmd
  - history.qmd
  - ecology.qmd
  - methodology.qmd
  - glossary.qmd
  - part: Species accounts
    chapters:
    - species_account/blera-fallax.qmd
    - species_account/myathropa-florea.qmd
  - statistics.qmd
  - conservation.qmd
  - references.qmd
format:
  html:
    number-sections: false
    toc: false
    toc-depth: 3
    smooth-scroll: true
    html-math-method: katex
    theme: cosmo
    css: style.css
execute:
  echo: false
  warning: false
  message: false
  freeze: auto
