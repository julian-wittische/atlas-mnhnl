project:
  type: book
  execute-dir: project
  #pre-render: code/pre-render.R

book:
  title: "Atlas of Hoverflies in Luxembourg"
  #cover-image: cover.png
  chapters:
    - index.qmd
    - acknowledgement.qmd
    - introduction.qmd
    - biophysical.qmd
    - history.qmd    
    - ecology.qmd
    - methodology.qmd
    - glossary.qmd
    - species.qmd
  #  - part: species.qmd
  #    chapters:
  #      - chapters/species/PLACEHOLDER.qmd
    - statistics.qmd
    - conservation.qmd
    - references.qmd

format:
  html:
    number-sections: false
    toc: true
    toc-depth: 3
    smooth-scroll: true
    html-math-method: katex
    theme:
        - cosmo
    css :
        - style.css

execute:
  echo: false
  warning: false
  message: false
  freeze: auto
